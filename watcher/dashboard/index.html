<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Orchestrator — Dashboard</title>
  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      /* Background layers — 4-level depth system */
      --bg-0: oklch(0.11 0.015 250);   /* page canvas */
      --bg-1: oklch(0.14 0.013 250);   /* sidebar / header */
      --bg-2: oklch(0.17 0.012 250);   /* cards */
      --bg-3: oklch(0.20 0.011 250);   /* elevated / hover */
      --bg-4: oklch(0.24 0.010 250);   /* inputs / selected */

      /* Borders */
      --border:        oklch(0.26 0.012 250);
      --border-subtle: oklch(0.22 0.010 250);
      --border-focus:  oklch(0.62 0.18 235);

      /* Text hierarchy */
      --text-1: oklch(0.93 0.010 250);   /* headings */
      --text-2: oklch(0.72 0.012 250);   /* body */
      --text-3: oklch(0.52 0.010 250);   /* muted / captions */
      --text-4: oklch(0.40 0.008 250);   /* placeholders */

      /* Semantic accent colors — OKLCH perceptually uniform */
      --blue:   oklch(0.68 0.16 235);
      --blue-d: oklch(0.52 0.18 235);
      --green:  oklch(0.70 0.16 145);
      --green-d:oklch(0.54 0.16 145);
      --yellow: oklch(0.75 0.16 80);
      --orange: oklch(0.70 0.18 50);
      --red:    oklch(0.64 0.20 25);
      --purple: oklch(0.72 0.14 300);
      --cyan:   oklch(0.76 0.12 210);

      /* Tinted shadows (hue-matched to background) */
      --shadow-sm: 0 1px 3px oklch(0.06 0.015 250 / 0.6),
                   0 1px 2px oklch(0.06 0.015 250 / 0.4);
      --shadow-md: 0 4px 12px oklch(0.06 0.015 250 / 0.5),
                   0 2px 4px  oklch(0.06 0.015 250 / 0.4);

      /* Typography */
      --font-sans: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;

      /* Spacing scale (8pt grid) */
      --s1: 4px;
      --s2: 8px;
      --s3: 12px;
      --s4: 16px;
      --s5: 24px;
      --s6: 32px;

      /* Radius */
      --r1: 4px;
      --r2: 6px;
      --r3: 8px;
      --r4: 12px;
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-0);
      color: var(--text-2);
      line-height: 1.5;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 52px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      grid-column: 1 / -1;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 var(--s5);
      gap: var(--s4);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: var(--s3);
      flex-shrink: 0;
    }

    .header-logo {
      width: 24px;
      height: 24px;
      border-radius: var(--r2);
      background: var(--blue-d);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid oklch(0.68 0.16 235 / 0.30);
    }

    .header-logo svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: oklch(0.85 0.08 235);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header h1 {
      font-size: 0.9rem;
      color: var(--text-1);
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .header-divider {
      width: 1px;
      height: 16px;
      background: var(--border);
      flex-shrink: 0;
    }

    .mode-badge {
      padding: 2px 8px;
      border-radius: var(--r1);
      font-size: 0.69rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      background: oklch(0.62 0.18 235 / 0.12);
      color: var(--blue);
      border: 1px solid oklch(0.62 0.18 235 / 0.25);
      font-family: var(--font-mono);
    }

    .status-pill {
      padding: 3px 10px 3px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.01em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-pill.running {
      background: oklch(0.70 0.16 145 / 0.1);
      color: var(--green);
      border: 1px solid oklch(0.70 0.16 145 / 0.25);
    }
    .status-pill.running .status-dot {
      background: var(--green);
      animation: pulse-dot 2s infinite;
    }

    .status-pill.completed {
      background: oklch(0.70 0.16 145 / 0.10);
      color: var(--green);
      border: 1px solid oklch(0.70 0.16 145 / 0.25);
    }
    .status-pill.completed .status-dot { background: var(--green); }

    .status-pill.stopped,
    .status-pill.crashed,
    .status-pill.failed {
      background: oklch(0.64 0.20 25 / 0.10);
      color: var(--red);
      border: 1px solid oklch(0.64 0.20 25 / 0.25);
    }
    .status-pill.stopped .status-dot,
    .status-pill.crashed .status-dot,
    .status-pill.failed .status-dot { background: var(--red); }

    .status-pill.restarting {
      background: oklch(0.75 0.16 80 / 0.10);
      color: var(--yellow);
      border: 1px solid oklch(0.75 0.16 80 / 0.25);
    }
    .status-pill.restarting .status-dot {
      background: var(--yellow);
      animation: pulse-dot 1s infinite;
    }

    .header-spacer { flex: 1; }

    .project-path {
      color: var(--text-4);
      font-size: 0.72rem;
      font-family: var(--font-mono);
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ws-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--text-3);
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--bg-0);
      border: 1px solid var(--border-subtle);
    }

    .ws-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      transition: background 0.3s ease;
    }

    .ws-dot.on  { background: var(--green); }
    .ws-dot.off { background: var(--text-4); }

    /* ── Animations ──────────────────────────────────────────────── */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (prefers-reduced-motion: reduce) {
      .status-dot,
      .task-status-dot,
      .progress-fill { animation: none !important; transition: none !important; }
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      background: var(--bg-1);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-section { padding: var(--s4); }
    .sidebar-section + .sidebar-section { border-top: 1px solid var(--border-subtle); }

    .sidebar-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--text-4);
      font-weight: 700;
      padding: 0 var(--s1);
      margin-bottom: var(--s2);
    }

    /* Phase items */
    .phase-item {
      padding: var(--s2) var(--s3);
      border-radius: var(--r2);
      margin-bottom: 2px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s ease, border-color 0.12s ease;
    }

    .phase-item:hover { background: var(--bg-3); }
    .phase-item:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 1px;
    }

    .phase-item.active {
      background: oklch(0.62 0.18 235 / 0.08);
      border-color: oklch(0.62 0.18 235 / 0.30);
      border-left-color: var(--blue);
      border-left-width: 2px;
    }

    .phase-item .phase-header {
      display: flex;
      align-items: center;
      gap: var(--s2);
    }

    .phase-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.60rem;
      font-weight: 700;
      flex-shrink: 0;
      font-family: var(--font-mono);
      transition: background 0.15s ease;
    }

    .phase-icon.pending {
      background: var(--bg-4);
      border: 1.5px solid var(--border);
      color: var(--text-3);
    }
    .phase-icon.running {
      background: oklch(0.62 0.18 235 / 0.20);
      border: 1.5px solid oklch(0.62 0.18 235 / 0.50);
      color: var(--blue);
    }
    .phase-icon.done {
      background: oklch(0.70 0.16 145 / 0.20);
      border: 1.5px solid oklch(0.70 0.16 145 / 0.40);
      color: var(--green);
    }
    .phase-icon.failed {
      background: oklch(0.64 0.20 25 / 0.20);
      border: 1.5px solid oklch(0.64 0.20 25 / 0.40);
      color: var(--red);
    }
    .phase-icon.gate_check {
      background: oklch(0.75 0.16 80 / 0.20);
      border: 1.5px solid oklch(0.75 0.16 80 / 0.40);
      color: var(--yellow);
    }

    .phase-name {
      font-size: 0.80rem;
      font-weight: 500;
      color: var(--text-2);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .phase-item.active .phase-name { color: var(--text-1); }

    .phase-tasks {
      font-size: 0.68rem;
      color: var(--text-3);
      margin-top: 3px;
      margin-left: 28px;
    }

    /* Controls */
    .controls-row {
      display: flex;
      gap: var(--s2);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0 var(--s4);
      border-radius: var(--r2);
      border: 1px solid var(--border);
      background: var(--bg-3);
      color: var(--text-2);
      cursor: pointer;
      font-size: 0.76rem;
      font-weight: 500;
      font-family: var(--font-sans);
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--bg-4);
      color: var(--text-1);
      border-color: oklch(0.40 0.010 250);
    }

    .btn:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }

    .btn:active { transform: translateY(1px); }

    .btn.danger {
      border-color: oklch(0.64 0.20 25 / 0.35);
      color: var(--red);
      background: oklch(0.64 0.20 25 / 0.06);
    }
    .btn.danger:hover {
      background: oklch(0.64 0.20 25 / 0.14);
      border-color: oklch(0.64 0.20 25 / 0.55);
    }

    .btn.primary {
      border-color: oklch(0.70 0.16 145 / 0.35);
      color: var(--green);
      background: oklch(0.70 0.16 145 / 0.06);
    }
    .btn.primary:hover {
      background: oklch(0.70 0.16 145 / 0.14);
      border-color: oklch(0.70 0.16 145 / 0.55);
    }

    /* History */
    .history-empty {
      padding: var(--s1);
      font-size: 0.76rem;
      color: var(--text-4);
    }

    .history-run {
      padding: var(--s2) var(--s1);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: var(--s2);
      font-size: 0.74rem;
    }

    .history-run:last-child { border-bottom: none; }

    .history-mode-badge {
      padding: 1px 6px;
      border-radius: var(--r1);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--bg-4);
      color: var(--text-3);
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .history-status-text { font-weight: 600; flex-shrink: 0; }
    .history-status-text.completed { color: var(--green); }
    .history-status-text.failed { color: var(--red); }

    .history-tasks { color: var(--text-3); }
    .history-spacer { flex: 1; }
    .history-dur { color: var(--text-4); font-family: var(--font-mono); font-size: 0.68rem; }

    /* ── Main ────────────────────────────────────────────────────── */
    .main {
      overflow-y: auto;
      padding: var(--s5);
      display: flex;
      flex-direction: column;
      gap: var(--s4);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Stat Cards ──────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: var(--s3);
    }

    .stat-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      padding: var(--s4) var(--s4);
      box-shadow: var(--shadow-sm);
    }

    .stat-label {
      font-size: 0.63rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-4);
      font-weight: 600;
      margin-bottom: var(--s2);
      white-space: nowrap;
    }

    .stat-value {
      font-size: 1.65rem;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      font-family: var(--font-mono);
      color: var(--text-1);
    }

    .stat-value.blue   { color: var(--blue); }
    .stat-value.green  { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.red    { color: var(--red); }
    .stat-value.purple { color: var(--purple); }
    .stat-value.muted  { color: var(--text-3); }

    /* ── Progress Bar ────────────────────────────────────────────── */
    .progress-section {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      padding: var(--s4) var(--s5);
      box-shadow: var(--shadow-sm);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--s3);
    }

    .progress-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: -0.005em;
    }

    .progress-pct {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--blue);
      font-variant-numeric: tabular-nums;
      font-family: var(--font-mono);
    }

    .progress-track {
      height: 5px;
      background: var(--bg-4);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      background: var(--blue);
    }

    /* ── Task Section ────────────────────────────────────────────── */
    .task-section {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .section-header {
      padding: var(--s3) var(--s5);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.005em;
    }

    /* Task items */
    .task-item {
      padding: var(--s3) var(--s5);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: flex-start;
      gap: var(--s3);
    }

    .task-item:last-child { border-bottom: none; }

    /* Status indicator column */
    .task-status-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--s1);
      padding-top: 2px;
      flex-shrink: 0;
      width: 52px;
    }

    .task-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.2s ease;
    }

    .task-status-dot.pending   { background: var(--text-4); }
    .task-status-dot.running   { background: var(--blue); animation: pulse-dot 1.5s infinite; }
    .task-status-dot.reviewing { background: var(--purple); animation: pulse-dot 1.5s infinite; }
    .task-status-dot.fixing    { background: var(--orange); animation: pulse-dot 1.5s infinite; }
    .task-status-dot.done      { background: var(--green); }
    .task-status-dot.failed    { background: var(--red); }
    .task-status-dot.skipped   { background: var(--text-4); opacity: 0.4; }

    /* Status chip */
    .task-status-chip {
      font-size: 0.60rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 5px;
      border-radius: var(--r1);
      white-space: nowrap;
      font-family: var(--font-mono);
      line-height: 1.3;
    }

    .task-status-chip.pending   { background: var(--bg-4); color: var(--text-3); }
    .task-status-chip.running   {
      background: oklch(0.68 0.16 235 / 0.15);
      color: var(--blue);
      border: 1px solid oklch(0.68 0.16 235 / 0.30);
    }
    .task-status-chip.reviewing {
      background: oklch(0.72 0.14 300 / 0.15);
      color: var(--purple);
      border: 1px solid oklch(0.72 0.14 300 / 0.30);
    }
    .task-status-chip.fixing {
      background: oklch(0.70 0.18 50 / 0.15);
      color: var(--orange);
      border: 1px solid oklch(0.70 0.18 50 / 0.30);
    }
    .task-status-chip.done {
      background: oklch(0.70 0.16 145 / 0.15);
      color: var(--green);
      border: 1px solid oklch(0.70 0.16 145 / 0.30);
    }
    .task-status-chip.failed {
      background: oklch(0.64 0.20 25 / 0.15);
      color: var(--red);
      border: 1px solid oklch(0.64 0.20 25 / 0.30);
    }
    .task-status-chip.skipped { background: var(--bg-4); color: var(--text-4); }

    .task-body { flex: 1; min-width: 0; }

    .task-top-row {
      display: flex;
      align-items: baseline;
      gap: var(--s3);
      margin-bottom: 3px;
    }

    .task-id {
      font-size: 0.68rem;
      color: var(--text-3);
      font-family: var(--font-mono);
      font-weight: 600;
      flex-shrink: 0;
    }

    .task-prompt {
      font-size: 0.80rem;
      color: var(--text-2);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* Score badge */
    .task-score-badge {
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 700;
      font-family: var(--font-mono);
      padding: 1px 6px;
      border-radius: var(--r1);
      line-height: 1.5;
    }

    .task-score-badge.empty { color: var(--text-4); }
    .task-score-badge.high {
      background: oklch(0.70 0.16 145 / 0.15);
      color: var(--green);
      border: 1px solid oklch(0.70 0.16 145 / 0.35);
    }
    .task-score-badge.mid {
      background: oklch(0.75 0.16 80 / 0.12);
      color: var(--yellow);
      border: 1px solid oklch(0.75 0.16 80 / 0.30);
    }
    .task-score-badge.low {
      background: oklch(0.64 0.20 25 / 0.12);
      color: var(--red);
      border: 1px solid oklch(0.64 0.20 25 / 0.30);
    }

    .task-meta {
      display: flex;
      gap: var(--s3);
      align-items: center;
    }

    .task-meta-item {
      font-size: 0.68rem;
      color: var(--text-4);
    }

    .task-meta-item strong {
      font-weight: 600;
      color: var(--text-3);
    }

    .task-empty {
      padding: var(--s6) var(--s5);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--s2);
    }

    .task-empty-icon {
      color: var(--text-4);
      margin-bottom: var(--s1);
    }

    .task-empty-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-3);
    }

    .task-empty-sub {
      font-size: 0.74rem;
      color: var(--text-4);
      line-height: 1.5;
    }

    /* ── Log Section ─────────────────────────────────────────────── */
    .log-section {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      min-height: 180px;
      flex: 1;
      overflow: hidden;
    }

    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: var(--s2) var(--s4) var(--s3);
      font-family: var(--font-mono);
      font-size: 0.71rem;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      /* Ensure a visible minimum even when empty */
      min-height: 120px;
    }

    .log-body::-webkit-scrollbar { width: 4px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-line {
      display: flex;
      gap: var(--s2);
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text-3);
    }

    .log-ts {
      color: var(--text-4);
      flex-shrink: 0;
      user-select: none;
    }

    .log-line.state   .log-msg { color: var(--blue); }
    .log-line.error   .log-msg { color: var(--red); }
    .log-line.orch    .log-msg { color: var(--purple); }
    .log-line.success .log-msg { color: var(--green); }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 960px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    @media (max-width: 600px) {
      .main { padding: var(--s4); }
      .task-item { padding-left: var(--s4); padding-right: var(--s4); }
      .section-header { padding-left: var(--s4); padding-right: var(--s4); }
      .progress-section { padding-left: var(--s4); padding-right: var(--s4); }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="header-logo" aria-hidden="true">
          <svg viewBox="0 0 14 14">
            <!-- center node -->
            <circle cx="7" cy="7" r="1.5" fill="oklch(0.85 0.08 235)" stroke="none"/>
            <!-- spoke lines -->
            <line x1="7" y1="5.5" x2="7" y2="2"/>
            <line x1="7" y1="8.5" x2="7" y2="12"/>
            <line x1="5.5" y1="7" x2="2" y2="7"/>
            <line x1="8.5" y1="7" x2="12" y2="7"/>
            <!-- outer nodes -->
            <circle cx="7" cy="2" r="1" fill="oklch(0.85 0.08 235)" stroke="none"/>
            <circle cx="7" cy="12" r="1" fill="oklch(0.85 0.08 235)" stroke="none"/>
            <circle cx="2" cy="7" r="1" fill="oklch(0.85 0.08 235)" stroke="none"/>
            <circle cx="12" cy="7" r="1" fill="oklch(0.85 0.08 235)" stroke="none"/>
          </svg>
        </div>
        <h1>Code Orchestrator</h1>
      </div>

      <div class="header-divider" aria-hidden="true"></div>

      <div class="mode-badge" id="modeBadge">—</div>

      <div class="status-pill stopped" id="statusPill" role="status" aria-label="Orchestrator status">
        <div class="status-dot"></div>
        <span id="statusText">Stopped</span>
      </div>

      <div class="header-spacer"></div>

      <div class="project-path" id="projectPath" title="">—</div>

      <div class="ws-indicator" role="status" aria-label="WebSocket connection status">
        <div class="ws-dot off" id="wsDot"></div>
        <span id="wsText">Offline</span>
      </div>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar" aria-label="Phases and controls">

      <div class="sidebar-section">
        <div class="sidebar-label">Phases</div>
        <div id="phaseList" role="list"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Controls</div>
        <div class="controls-row">
          <button class="btn primary" onclick="restartOrch()" style="flex:1" aria-label="Restart orchestrator">Restart</button>
          <button class="btn danger"  onclick="stopOrch()"    style="flex:1" aria-label="Stop orchestrator">Stop</button>
        </div>
      </div>

      <div class="sidebar-section" style="flex:1">
        <div class="sidebar-label">Run History</div>
        <div id="historyList">
          <div class="history-empty">No previous runs</div>
        </div>
      </div>

    </nav>

    <!-- Main content -->
    <main class="main">

      <!-- Stat cards -->
      <div class="stats-row" role="region" aria-label="Run statistics">
        <div class="stat-card">
          <div class="stat-label">Tasks</div>
          <div class="stat-value blue" id="taskProgress">0/0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Phases</div>
          <div class="stat-value blue" id="phaseProgress">0/0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Score</div>
          <div class="stat-value green" id="avgScore">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Cost</div>
          <div class="stat-value purple" id="totalCost">$0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Uptime</div>
          <div class="stat-value muted" id="uptime">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Restarts</div>
          <div class="stat-value muted" id="restarts">0</div>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="progress-section" role="region" aria-label="Overall progress">
        <div class="progress-header">
          <span class="progress-title">Overall Progress</span>
          <span class="progress-pct" id="progressPct" aria-live="polite">0%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progressBar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>

      <!-- Current phase tasks -->
      <div class="task-section" id="taskSection" role="region">
        <div class="section-header">
          <span class="section-title" id="taskSectionHeader">Tasks</span>
        </div>
        <div id="taskList">
          <div class="task-empty">
            <div class="task-empty-icon" aria-hidden="true">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 7v5l3 3"/>
              </svg>
            </div>
            <div class="task-empty-title">Waiting for orchestrator</div>
            <div class="task-empty-sub">Tasks will appear here once a run is active</div>
          </div>
        </div>
      </div>

      <!-- Live log -->
      <div class="log-section" role="region" aria-label="Live log">
        <div class="section-header">
          <span class="section-title">Live Log</span>
          <div>
            <button class="btn" onclick="clearLog()" aria-label="Clear log">Clear</button>
          </div>
        </div>
        <div class="log-body" id="log" aria-live="polite" aria-label="Log output"></div>
      </div>

    </main>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────
    const PORT = location.port || 3111;
    const params = new URLSearchParams(location.search);
    const TOKEN = params.get('token') || '';
    const tokenQuery = TOKEN ? `?token=${TOKEN}` : '';
    const BASE = `http://${location.hostname}:${PORT}`;
    const WS_URL = `ws://${location.hostname}:${PORT}${tokenQuery}`;
    let ws;
    let phases = [];
    let selectedPhaseIdx = -1;
    let orchStatus = "stopped";
    let orchMode = "--";
    let totalCost = 0;

    // ── WebSocket ─────────────────────────────────────────
    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        document.getElementById('wsDot').className = 'ws-dot on';
        document.getElementById('wsText').textContent = 'Live';
        addLog('Connected to supervisor', 'success');
      };

      ws.onclose = () => {
        document.getElementById('wsDot').className = 'ws-dot off';
        document.getElementById('wsText').textContent = 'Reconnecting...';
        setTimeout(connect, 3000);
      };

      ws.onmessage = (evt) => {
        const d = JSON.parse(evt.data);
        handleEvent(d);
      };
    }

    function handleEvent(d) {
      switch (d.type) {
        case 'initial_state':
          if (d.project_cwd) {
            const el = document.getElementById('projectPath');
            el.textContent = d.project_cwd;
            el.title = d.project_cwd;
          }
          if (d.orchestrator) {
            setStatus(d.orchestrator.status, d.orchestrator.restarts);
            if (d.mode) setMode(d.mode);
            if (d.phases) {
              phases = d.phases;
              renderPhases();
              updateStats();
              if (selectedPhaseIdx < 0 && phases.length > 0) selectPhase(0);
            }
          }
          if (d.history) renderHistory(d.history);
          break;

        case 'plan_ready':
          addLog(`Plan ready: ${d.phases} phases, ${d.totalTasks} tasks`, 'success');
          break;

        case 'state_update':
          if (d.phases) {
            phases = d.phases;
            renderPhases();
            updateStats();
            renderTasks();
          }
          if (d.status) setStatus(d.status);
          if (d.mode) setMode(d.mode);
          break;

        case 'phase_start':
          updatePhaseStatus(d.phaseId, 'running');
          addLog(`Phase started: ${d.name || d.phaseId}`, 'state');
          const runIdx = phases.findIndex(p => p.id === d.phaseId);
          if (runIdx >= 0) selectPhase(runIdx);
          break;

        case 'phase_done':
          updatePhaseStatus(d.phaseId, 'done');
          addLog(`Phase done: ${d.phaseId}`, 'success');
          break;

        case 'task_start':
          updateTaskStatus(d.taskId, d.phaseId, 'running');
          addLog(`Task started: ${d.taskId}`, 'orch');
          break;

        case 'task_done':
          updateTaskStatus(d.taskId, null, 'done', d.score);
          addLog(`Task done: ${d.taskId} (score: ${d.score})`, 'success');
          updateStats();
          break;

        case 'task_reviewing':
          updateTaskStatus(d.taskId, null, 'reviewing');
          break;

        case 'task_reviewed':
          addLog(`Review: ${d.taskId} — score ${d.score}, ${d.approved ? 'APPROVED' : 'REJECTED'}`, d.approved ? 'success' : 'error');
          break;

        case 'task_timeout':
          updateTaskStatus(d.taskId, null, 'failed');
          addLog(`Task TIMEOUT: ${d.taskId}`, 'error');
          break;

        case 'run_complete':
          setStatus(d.status === 'completed' ? 'completed' : 'stopped');
          addLog(`Run complete: ${d.status} — ${d.doneTasks}/${d.totalTasks} tasks in ${Math.floor(d.elapsed/60)}m`, 'success');
          break;

        case 'error':
          addLog(`ERROR: ${d.message}`, 'error');
          break;

        case 'orchestrator_started':
          setStatus('running', d.restart);
          addLog(`Orchestrator started (restart #${d.restart})`, 'orch');
          break;

        case 'orchestrator_completed':
          setStatus('completed');
          addLog('Orchestrator completed!', 'success');
          break;

        case 'orchestrator_crashed':
          setStatus('crashed', d.restarts);
          addLog(`Orchestrator CRASHED (exit: ${d.exit_code || 'unknown'})`, 'error');
          break;

        case 'orchestrator_restarting':
          setStatus('restarting', d.attempt);
          addLog(`Restarting in ${d.in_ms/1000}s (attempt ${d.attempt})...`, 'orch');
          break;

        case 'orchestrator_max_restarts':
          setStatus('stopped', d.restarts);
          addLog(`Max restarts reached (${d.restarts}). Stopped.`, 'error');
          break;

        case 'log':
          addLog(d.text, d.text?.includes('[ERR]') ? 'error' : 'orch');
          break;

        case 'state_change':
          addLog(`Agent -> ${d.state}`, 'state');
          break;

        case 'turn_complete':
          addLog(`Turn complete (${d.durationMs || d.duration_ms || 0}ms)`, 'success');
          break;
      }
    }

    // ── Render phases sidebar ─────────────────────────────
    function renderPhases() {
      const container = document.getElementById('phaseList');
      container.innerHTML = '';

      phases.forEach((phase, idx) => {
        const el = document.createElement('div');
        el.className = `phase-item${idx === selectedPhaseIdx ? ' active' : ''}`;
        el.setAttribute('role', 'listitem');
        el.setAttribute('tabindex', '0');
        el.onclick = () => selectPhase(idx);
        el.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectPhase(idx); } };

        const doneTasks  = phase.tasks.filter(t => t.status === 'done').length;
        const totalTasks = phase.tasks.length;
        const iconClass  = phase.status || 'pending';
        const iconText   = iconClass === 'done'    ? '&#10003;'
                         : iconClass === 'running' ? '&#9654;'
                         : iconClass === 'failed'  ? '&#10005;'
                         : (idx + 1);

        el.innerHTML = `
          <div class="phase-header">
            <div class="phase-icon ${iconClass}" aria-hidden="true">${iconText}</div>
            <div class="phase-name" title="${esc(phase.name || phase.id)}">${esc(phase.name || phase.id)}</div>
          </div>
          <div class="phase-tasks">${doneTasks}/${totalTasks} tasks</div>
        `;
        container.appendChild(el);
      });
    }

    function selectPhase(idx) {
      selectedPhaseIdx = idx;
      renderPhases();
      renderTasks();
    }

    // ── Render tasks ──────────────────────────────────────
    function renderTasks() {
      if (selectedPhaseIdx < 0 || !phases[selectedPhaseIdx]) return;
      const phase = phases[selectedPhaseIdx];
      document.getElementById('taskSectionHeader').textContent = `${phase.name || phase.id} — Tasks`;

      const container = document.getElementById('taskList');
      container.innerHTML = '';

      if (phase.tasks.length === 0) {
        container.innerHTML = `
          <div class="task-empty">
            <div class="task-empty-title">No tasks in this phase</div>
          </div>`;
        return;
      }

      phase.tasks.forEach(task => {
        const el = document.createElement('div');
        el.className = 'task-item';

        let scoreClass = 'empty';
        if (task.reviewScore >= 8)      scoreClass = 'high';
        else if (task.reviewScore >= 6) scoreClass = 'mid';
        else if (task.reviewScore > 0)  scoreClass = 'low';

        const scoreText = task.reviewScore > 0 ? task.reviewScore : '—';
        const retriesHtml = task.retries > 0
          ? `<span class="task-meta-item">Retries: <strong>${task.retries}</strong></span>`
          : '';

        el.innerHTML = `
          <div class="task-status-col" aria-hidden="true">
            <div class="task-status-dot ${task.status}"></div>
            <div class="task-status-chip ${task.status}">${esc(task.status)}</div>
          </div>
          <div class="task-body">
            <div class="task-top-row">
              <span class="task-id">${esc(task.id)}</span>
              <span class="task-prompt" title="${esc(task.prompt)}">${esc(task.prompt.slice(0, 200))}</span>
              <span class="task-score-badge ${scoreClass}">${scoreText}</span>
            </div>
            ${retriesHtml ? `<div class="task-meta">${retriesHtml}</div>` : ''}
          </div>
        `;
        container.appendChild(el);
      });
    }

    // ── Update helpers ────────────────────────────────────
    function updatePhaseStatus(phaseId, status) {
      const phase = phases.find(p => p.id === phaseId);
      if (phase) {
        phase.status = status;
        renderPhases();
      }
    }

    function updateTaskStatus(taskId, phaseId, status, score) {
      for (const phase of phases) {
        const task = phase.tasks.find(t => t.id === taskId);
        if (task) {
          task.status = status;
          if (score !== undefined) task.reviewScore = score;
          break;
        }
      }
      renderTasks();
    }

    function updateStats() {
      const totalTasks = phases.reduce((s, p) => s + p.tasks.length, 0);
      const doneTasks  = phases.reduce((s, p) => s + p.tasks.filter(t => t.status === 'done').length, 0);
      const donePhases = phases.filter(p => p.status === 'done').length;
      const pct        = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;

      document.getElementById('taskProgress').textContent  = `${doneTasks}/${totalTasks}`;
      document.getElementById('phaseProgress').textContent = `${donePhases}/${phases.length}`;
      document.getElementById('progressPct').textContent   = `${pct}%`;

      const fill = document.getElementById('progressFill');
      fill.style.width = `${pct}%`;
      const bar = document.getElementById('progressBar');
      bar.setAttribute('aria-valuenow', pct);

      // Average score
      let totalScore = 0, scoredCount = 0;
      for (const p of phases) {
        for (const t of p.tasks) {
          if (t.reviewScore > 0) { totalScore += t.reviewScore; scoredCount++; }
        }
      }
      const avg   = scoredCount > 0 ? (totalScore / scoredCount).toFixed(1) : '—';
      const avgEl = document.getElementById('avgScore');
      avgEl.textContent = avg;
      if (avg !== '—') {
        avgEl.className = 'stat-value ' + (avg >= 8 ? 'green' : avg >= 6 ? 'yellow' : 'red');
      }
    }

    function setStatus(status, restarts) {
      orchStatus = status || 'stopped';
      const pill = document.getElementById('statusPill');
      pill.className = `status-pill ${orchStatus}`;
      document.getElementById('statusText').textContent = orchStatus;

      if (restarts !== null && restarts !== undefined) {
        const el = document.getElementById('restarts');
        el.textContent = restarts;
        el.className = 'stat-value ' + (restarts > 0 ? 'yellow' : 'muted');
      }
    }

    function setMode(mode) {
      orchMode = mode;
      document.getElementById('modeBadge').textContent = mode;
    }

    // ── Log ──────────────────────────────────────────────
    function addLog(text, cls = '') {
      const log  = document.getElementById('log');
      const line = document.createElement('div');
      line.className = 'log-line ' + cls;

      const time = new Date().toLocaleTimeString('en-US', { hour12: false });

      const ts  = document.createElement('span');
      ts.className = 'log-ts';
      ts.textContent = `[${time}]`;

      const msg = document.createElement('span');
      msg.className = 'log-msg';
      msg.textContent = text;

      line.appendChild(ts);
      line.appendChild(msg);
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
      while (log.children.length > 500) log.removeChild(log.firstChild);
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    // ── History ──────────────────────────────────────────
    function renderHistory(history) {
      const container = document.getElementById('historyList');
      if (!history || history.length === 0) {
        container.innerHTML = '<div class="history-empty">No previous runs</div>';
        return;
      }

      container.innerHTML = '';
      const recent = history.slice(-10).reverse();
      for (const run of recent) {
        const el = document.createElement('div');
        el.className = 'history-run';

        const dur         = run.durationMs ? formatDuration(Math.floor(run.durationMs / 1000)) : '—';
        const statusClass = run.status === 'completed' ? 'completed' : 'failed';

        el.innerHTML = `
          <span class="history-mode-badge">${esc(run.mode || '?')}</span>
          <span class="history-status-text ${statusClass}">${esc(run.status)}</span>
          <span class="history-tasks">${run.completedTasks || 0}/${run.totalTasks || 0}</span>
          <span class="history-spacer"></span>
          <span class="history-dur">${dur}</span>
        `;
        container.appendChild(el);
      }
    }

    // ── HTTP helpers ────────────────────────────────────
    function authFetch(url, opts = {}) {
      const headers = opts.headers || {};
      if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`;
      return fetch(url, { ...opts, headers });
    }

    // ── Health polling ────────────────────────────────────
    async function pollHealth() {
      try {
        const res = await fetch(`${BASE}/health`);
        const d   = await res.json();
        document.getElementById('uptime').textContent = formatDuration(d.uptime_s);
        setStatus(d.orchestrator_status, d.orchestrator_restarts);
      } catch { /* offline */ }
    }

    async function pollState() {
      try {
        const res = await authFetch(`${BASE}/state`);
        if (res.status === 401) {
          addLog('Auth required. Add ?token=YOUR_TOKEN to the URL.', 'error');
          return;
        }
        const d = await res.json();
        if (d.orchestrator?.phases && d.orchestrator.phases.length > 0) {
          phases = d.orchestrator.phases;
          renderPhases();
          updateStats();
          renderTasks();
        }
        if (d.mode) setMode(d.mode);
        if (d.history) renderHistory(d.history);
        if (d.cost !== undefined && d.cost > 0) {
          totalCost = d.cost;
          document.getElementById('totalCost').textContent = `$${totalCost.toFixed(2)}`;
        }
      } catch { /* offline */ }
    }

    function formatDuration(s) {
      if (!s || s < 0) return '—';
      const h   = Math.floor(s / 3600);
      const m   = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${sec}s`;
      return `${sec}s`;
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Controls ─────────────────────────────────────────
    async function restartOrch() {
      if (!confirm('Restart orchestrator?')) return;
      await authFetch(`${BASE}/restart`, { method: 'POST' });
      addLog('Manual restart requested', 'orch');
    }

    async function stopOrch() {
      if (!confirm('Stop orchestrator?')) return;
      await authFetch(`${BASE}/stop`, { method: 'POST' });
      addLog('Manual stop requested', 'error');
    }

    // ── Init ─────────────────────────────────────────────
    connect();
    setInterval(pollHealth, 5000);
    setInterval(pollState, 10000);
    pollHealth();
    setTimeout(pollState, 1000);
  </script>
</body>
</html>
